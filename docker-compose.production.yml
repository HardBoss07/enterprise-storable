version: "3.8"

services:
  storable:
    # 1. Update this to your Docker Hub image name
    image: m4tt3o/storable:latest
    container_name: storable_app
    restart: unless-stopped
    # 2. Portainer handles these via its "Environment Variables" UI
    # but keeping this here for local reference is fine
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${HOST_PORT_BACKEND:-8080}:8080"
      - "${HOST_PORT_FRONTEND:-3000}:3000"
    volumes:
      # 3. Change relative path to an absolute path for your homelab
      - /home/youruser/storable/storage:/app/storage
    networks:
      - storable-net

  db:
    image: mysql:8.0
    container_name: storable_db
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-storable}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    ports:
      - "${HOST_PORT_DB:-3306}:3306"
    volumes:
      - db-data:/var/lib/mysql
      # 4. Note: These SQL files must exist on the homelab server
      # at these exact paths for the DB to initialize!
      - /home/youruser/storable/db/schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - /home/youruser/storable/db/indexes.sql:/docker-entrypoint-initdb.d/002_indexes.sql
      - /home/youruser/storable/db/base-data.sql:/docker-entrypoint-initdb.d/003_base-data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
    networks:
      - storable-net

networks:
  storable-net:
    driver: bridge

volumes:
  db-data:
