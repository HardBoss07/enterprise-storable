spring:
  servlet:
    multipart:
      max-file-size: ${MAX_FILE_SIZE:5GB}
      max-request-size: ${MAX_REQUEST_SIZE:5GB}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/storable?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:backend_user}
    password: ${SPRING_DATASOURCE_PASSWORD:backend_password}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    show-sql: ${SPRING_JPA_SHOW_SQL:true}
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:none}
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    properties:
      hibernate:
        format_sql: ${SPRING_JPA_PROPERTIES_HIBERNATE_FORMAT_SQL:true}
        dialect: ${SPRING_JPA_DATABASE_PLATFORM:org.hibernate.dialect.MySQLDialect}

server:
  port: ${SERVER_PORT:8080}

storable:
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  storage:
    upload-dir: ${STORABLE_STORAGE_UPLOAD_DIR:storage}
  auth:
    guest-user-id: ${STORABLE_AUTH_GUEST_USER_ID:00000000-0000-0000-0000-000000000000}
    guest-mode-enabled: ${STORABLE_AUTH_GUEST_MODE_ENABLED:true}
